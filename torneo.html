<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#08070b" />
  <title>AWS Star Battle | Torneo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <style>
    body{background:#08070b!important;background-image:none!important}.topbar{border-bottom-color:rgba(0,225,255,.3)!important;background:rgba(2,4,7,.84)!important}.brand b,.eyebrow{color:#a967ff!important}.status i{background:#00ddf7!important;box-shadow:0 0 13px #00ddf7!important}.admin-toggle{border-color:#00bcd4!important;color:#9ff8ff!important}.admin-toggle:hover,.admin-toggle.active{background:#007f9c!important}.event-page{max-width:1240px;margin:auto;padding:60px 28px 90px}.back-link{display:inline-block;color:#b7fbff;text-decoration:none;font-weight:600;margin-bottom:25px}.event-hero,.panel{background:linear-gradient(145deg,rgba(10,16,24,.9),rgba(11,6,19,.88));border:1px solid rgba(0,222,255,.22)}.event-hero{padding:clamp(25px,5vw,52px);position:relative;overflow:hidden}.event-hero:before{content:'';position:absolute;top:0;left:0;width:58px;border-top:2px solid #00e3f8}.event-hero h1{font:700 clamp(29px,5vw,55px) Orbitron,sans-serif;margin:0 0 25px;letter-spacing:-2px}.event-info{display:flex;flex-wrap:wrap;gap:12px 28px;color:#d9e2e8}.event-info span{font-size:16px}.event-info small{display:block;color:#8fa2ae;font:600 9px Orbitron,sans-serif;letter-spacing:1px;margin-bottom:4px}.event-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.45fr);gap:18px;margin-top:18px}.panel{padding:28px}.panel h2{font:700 24px Orbitron,sans-serif;margin:0 0 9px}.panel-copy{color:#b8c3cb;margin:0 0 23px;line-height:1.45}.admin-only{display:none}.admin .admin-only{display:block}.registration-list{display:grid;gap:9px}.team-entry{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid rgba(0,222,255,.14)}.team-entry:last-child{border-bottom:0}.team-entry img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#0fe8ff}.team-entry span{font-weight:600}.team-picker{max-height:420px;overflow:auto;padding-right:8px}.team-picker label{display:flex;align-items:center;gap:10px;padding:9px 0;margin:0;border-bottom:1px solid rgba(0,222,255,.14);cursor:pointer}.team-picker input{width:18px;height:18px;accent-color:#05b9d3}.empty-message{color:#b8c3cb;border:1px dashed rgba(0,222,255,.35);padding:20px}.actions{display:flex;flex-wrap:wrap;gap:10px;margin-top:22px}.add-btn,.form-save{background:linear-gradient(100deg,#7b35e7,#05b9d3)!important}.action-secondary{padding:12px 17px;border:1px solid #00bcd4;background:transparent;color:#b7fbff;font:600 12px 'Chakra Petch',sans-serif;cursor:pointer}.rounds{display:grid;gap:14px}.round{border:1px solid rgba(0,222,255,.2);background:rgba(2,10,15,.42)}.round h3{font:700 14px Orbitron,sans-serif;letter-spacing:.4px;padding:14px 16px;margin:0;background:rgba(0,199,225,.08);color:#b7fbff}.match{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;padding:13px 16px;border-top:1px solid rgba(0,222,255,.13)}.match .home{text-align:right}.versus{font:700 11px Orbitron,sans-serif;color:#ab55ff}.bye{padding:12px 16px;color:#b8c3cb;border-top:1px solid rgba(0,222,255,.13)}.started{display:inline-block;background:#007f9c;color:#fff;padding:7px 10px;font:700 10px Orbitron,sans-serif;letter-spacing:1px;margin-bottom:15px}.modal{border-color:#00d7ef!important;background:linear-gradient(140deg,#0a0f17,#171025)!important}.login-copy{color:#b8c3cb;line-height:1.45;margin:-12px 0 18px}@media(max-width:800px){.event-page{padding:42px 18px 65px}.event-layout{grid-template-columns:1fr}.event-hero h1{font-size:31px}.top-actions{gap:8px}.match{font-size:14px}}
  </style>
</head>
<body>
  <div class="page-glow glow-one"></div><div class="page-glow glow-two"></div>
  <header class="topbar"><a class="brand" href="index.html" aria-label="AWS Star Battle, torna alla home"><img src="logo-aws.png" alt="Logo AWS Star Battle"><span>AWS <b>STAR BATTLE</b></span></a><div class="top-actions"><span class="status"><i></i> LIVE RANKING</span><a class="admin-toggle rules-link" href="regole.html">Regole</a><button class="admin-toggle" id="adminToggle">Area riservata</button></div></header>
  <main class="event-page">
    <a class="back-link" href="index.html#tournaments">← Torna ai tornei</a>
    <section class="event-hero" id="eventHero"></section>
    <div class="event-layout">
      <section class="panel"><h2>Squadre iscritte</h2><p class="panel-copy" id="registrationCopy"></p><div class="registration-list" id="registeredTeams"></div><form class="admin-only" id="registrationForm"><div class="team-picker" id="teamPicker"></div><div class="actions"><button class="add-btn" type="submit">Salva iscrizioni</button></div></form></section>
      <section class="panel"><h2>Abbinamenti</h2><p class="panel-copy">Formato Round Robin: ogni squadra affronta tutte le altre una volta.</p><div class="admin-only actions"><button class="add-btn" id="startTournament" type="button">Avvia Round Robin</button><button class="action-secondary" id="shuffleTournament" type="button">Rimescola abbinamenti</button></div><div class="rounds" id="rounds"></div></section>
    </div>
  </main>
  <div class="modal-backdrop" id="loginBackdrop" aria-hidden="true"><section class="modal login-modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle"><button class="close" id="closeLogin" aria-label="Chiudi">×</button><p class="eyebrow">ACCESSO AMMINISTRATORE</p><h3 id="loginTitle">Area riservata</h3><p class="login-copy">Inserisci la password per gestire iscrizioni e abbinamenti.</p><form id="loginForm" action="javascript:void(0)"><label>Password<input id="adminPassword" type="password" autocomplete="current-password" required placeholder="La tua password"></label><button class="form-save" id="loginSubmit" type="button">Accedi</button></form></section></div>
  <div class="toast" id="toast"></div>
  <script src="tournament.js"></script>
  <script type="module" src="firebase-client.js"></script>
</body>
</html>
