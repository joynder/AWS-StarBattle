<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#10051d" />
  <title>Aprilia WestSide Star Battle | Accedi o Registrati</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=Orbitron:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=20260714-1" />
  <style>
    .auth-page {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: calc(100vh - 86px);
      padding: 40px 20px;
      position: relative;
    }
    .auth-card {
      width: min(480px, 100%);
      background: var(--bg-card);
      border: 1.5px solid var(--accent-violet);
      box-shadow: 0 0 50px rgba(155, 63, 255, 0.3);
      padding: 40px;
      border-radius: 16px;
      position: relative;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      animation: cardEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes cardEnter {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .auth-card h2 {
      font: 700 28px var(--font-heading);
      margin: 0 0 8px;
      color: var(--text-white);
      text-shadow: 0 0 10px rgba(155, 63, 255, 0.4);
      text-align: center;
    }
    .auth-subtitle {
      color: var(--text-muted);
      text-align: center;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .auth-toggle-tip {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-muted);
    }
    .auth-toggle-tip button {
      background: none;
      border: none;
      color: var(--accent-cyan);
      font-weight: 600;
      font-family: var(--font-cyber);
      cursor: pointer;
      padding: 0 4px;
      text-decoration: underline;
      transition: var(--transition);
    }
    .auth-toggle-tip button:hover {
      color: var(--text-white);
      text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
    }
    .social-auth {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid rgba(155, 63, 255, 0.2);
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(155, 63, 255, 0.3);
      color: var(--text-white);
      padding: 12px 16px;
      border-radius: 6px;
      font-family: var(--font-cyber);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      width: 100%;
    }
    .google-btn:hover {
      background: var(--text-white);
      color: #10051d;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.4);
      border-color: var(--text-white);
    }
    .google-btn svg {
      width: 18px;
      height: 18px;
    }
    .form-btn {
      margin-top: 24px;
      width: 100%;
      background: linear-gradient(135deg, var(--accent-violet) 0%, var(--accent-pink) 100%);
      color: var(--text-white);
      border: 0;
      padding: 14px;
      border-radius: 6px;
      font-family: var(--font-heading);
      font-size: 13px;
      letter-spacing: 1.5px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      text-transform: uppercase;
      box-shadow: 0 4px 15px rgba(155, 63, 255, 0.4);
    }
    .form-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 46, 147, 0.5);
    }
    .hidden {
      display: none;
    }
    .back-to-home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 20px;
      transition: var(--transition);
    }
    .back-to-home:hover {
      color: var(--accent-cyan);
    }
  </style>
</head>
<body>
  <div class="page-glow glow-one"></div><div class="page-glow glow-two"></div>
  
  <header class="topbar">
    <a class="brand" href="index.html"><img src="logo-aws.png" alt="Logo Aprilia WestSide Star Battle"><span>AWS <b>STAR BATTLE</b></span></a>
  </header>

  <main class="auth-page">
    <div style="width: min(480px, 100%);">
      <a class="back-to-home" href="index.html">← Torna alla classifica</a>
      
      <!-- CARD ACCEDI -->
      <section class="auth-card" id="loginCard">
        <h2>ACCEDI</h2>
        <p class="auth-subtitle">Entra per gestire il tuo profilo e la tua squadra.</p>
        
        <form id="loginForm" action="javascript:void(0)">
          <label>Email
            <input type="email" name="email" required placeholder="Inserisci la tua email">
          </label>
          <label>Password
            <input type="password" name="password" required placeholder="Inserisci la tua password">
          </label>
          <button class="form-btn" type="submit">Accedi</button>
        </form>

        <div class="social-auth">
          <button class="google-btn" id="googleLoginBtn">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Accedi con Google
          </button>
        </div>

        <p class="auth-toggle-tip">Non hai un account? <button id="toSignUpBtn">Registrati</button></p>
      </section>

      <!-- CARD REGISTRATI -->
      <section class="auth-card hidden" id="registerCard">
        <h2>REGISTRATI</h2>
        <p class="auth-subtitle">Crea un account Blader ed entra nell'arena.</p>
        
        <form id="registerForm" action="javascript:void(0)">
          <label>Nickname
            <input type="text" name="nickname" required placeholder="Il tuo nome da Blader">
          </label>
          <label>Email
            <input type="email" name="email" required placeholder="Inserisci la tua email">
          </label>
          <label>Password
            <input type="password" name="password" required placeholder="Minimo 6 caratteri" minlength="6">
          </label>
          <button class="form-btn" type="submit">Registrati</button>
        </form>

        <p class="auth-toggle-tip">Hai già un account? <button id="toLoginBtn">Accedi</button></p>
      </section>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script type="module" src="firebase-client.js"></script>
  <script type="module">
    function toast(message) {
      const element = document.getElementById('toast');
      element.textContent = message;
      element.classList.add('show');
      setTimeout(() => element.classList.remove('show'), 2500);
    }

    const loginCard = document.getElementById('loginCard');
    const registerCard = document.getElementById('registerCard');
    const toSignUpBtn = document.getElementById('toSignUpBtn');
    const toLoginBtn = document.getElementById('toLoginBtn');

    toSignUpBtn.addEventListener('click', () => {
      loginCard.classList.add('hidden');
      registerCard.classList.remove('hidden');
    });

    toLoginBtn.addEventListener('click', () => {
      registerCard.classList.add('hidden');
      loginCard.classList.remove('hidden');
    });

    window.addEventListener('aws-store-ready', () => {
      const auth = window.awsAuth;

      // Se l'utente è già loggato, reindirizzalo al profilo
      auth.onAuthChange((user) => {
        if (user) {
          window.location.href = 'profilo.html';
        }
      });

      // Gestione Submit Login
      document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        try {
          await auth.loginWithEmail(data.email, data.password);
          toast('Accesso effettuato!');
        } catch (error) {
          console.error(error);
          let msg = 'Errore durante l\'accesso.';
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
            msg = 'Email o password non corrette.';
          }
          toast(msg);
        }
      });

      // Gestione Submit Registrazione
      document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = Object.fromEntries(new FormData(e.target));
        try {
          await auth.signUp(data.email, data.password, data.nickname);
          toast('Registrazione completata!');
        } catch (error) {
          console.error(error);
          let msg = 'Errore durante la registrazione.';
          if (error.code === 'auth/email-already-in-use') {
            msg = 'Questa email è già in uso.';
          } else if (error.code === 'auth/invalid-email') {
            msg = 'Email non valida.';
          }
          toast(msg);
        }
      });

      // Login con Google
      document.getElementById('googleLoginBtn').addEventListener('click', async () => {
        try {
          await auth.loginWithGoogle();
          toast('Accesso con Google effettuato!');
        } catch (error) {
          console.error(error);
          toast('Errore nell\'accesso con Google.');
        }
      });
    });
  </script>
</body>
</html>
